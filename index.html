<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#8B0000,#D32F2F);
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    margin-bottom:15px;
}

h1{
    color:#B22222;
    font-size:24px;
}

p{
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

input:focus{
    outline:none;
    border:1px solid #B22222;
}

button{
    width:100%;
    padding:12px;
    background:#B22222;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#8B0000;
}

a{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#B22222;
}

.footer{
    margin-top:20px;
    color:gray;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

<img src="logo.png" class="logo" alt="College Logo">

<h1>Adhiparasakthi Engineering College</h1>

<p>Student Login Portal</p>

<form onsubmit="return login()">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">LOGIN</button>

</form>

<a href="#">Forgot Password?</a>

<div class="footer">
Melmaruvathur, Tamil Nadu
</div>

</div>

<script>
function login(){
    alert("Login Successful!");
    return false;
}
</script>

</body>
</html>
